# Integration Quality Scale tracking for Ticker
# https://developers.home-assistant.io/docs/core/integration-quality-scale/

rules:
  # ============================================================================
  # Bronze tier (minimum for new integrations)
  # ============================================================================
  
  # Config flow
  action-setup: done
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: todo
    comment: Tests not yet implemented
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: done
    comment: Sensor entities set up via async_setup_entry in sensor.py
  entity-unique-id:
    status: done
    comment: Format ticker_{entry_id}_{category_id}
  has-entity-name:
    status: done
    comment: Sensors use has_entity_name = True
  runtime-data: done
  test-before-setup:
    status: todo
    comment: Should verify setup will succeed before proceeding
  unique-config-entry: done

  # ============================================================================
  # Silver tier
  # ============================================================================
  
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: todo
    comment: Configuration options not fully documented
  docs-troubleshooting:
    status: todo
    comment: Troubleshooting section not yet added
  entity-unavailable:
    status: done
    comment: Sensors are always available (local in-memory data)
  integration-owner: done
  log-when-unavailable:
    status: exempt
    comment: Sensors use local data, never unavailable
  parallel-updates:
    status: exempt
    comment: Sensors use in-memory data, no external updates
  reauthentication-flow:
    status: exempt
    comment: Integration has no authentication
  test-coverage:
    status: todo
    comment: Tests not yet implemented

  # ============================================================================
  # Gold tier
  # ============================================================================
  
  devices:
    status: exempt
    comment: Integration does not create devices
  diagnostics:
    status: todo
    comment: Diagnostics handler not yet implemented
  discovery:
    status: exempt
    comment: Integration is not discoverable
  discovery-update-info:
    status: exempt
    comment: Integration is not discoverable
  docs-data-update:
    status: exempt
    comment: Integration does not poll external data
  docs-examples:
    status: done
    comment: README includes service call examples
  docs-known-limitations:
    status: todo
    comment: Known limitations not documented
  docs-supported-devices:
    status: exempt
    comment: Integration does not support devices
  docs-supported-functions:
    status: todo
    comment: Full function documentation pending
  docs-use-cases:
    status: done
    comment: README explains use cases
  dynamic-devices:
    status: exempt
    comment: Integration does not create devices
  entity-category:
    status: done
    comment: Sensors are primary entities (no category set)
  entity-device-class:
    status: done
    comment: No device class applies to notification counts
  entity-disabled-by-default:
    status: done
    comment: Sensors visible by default for dashboard use
  entity-translations:
    status: todo
    comment: Could add translation keys for entity name; deferred to v1.4
  exception-translations: done
  icon-translations:
    status: todo
    comment: Uses category icon directly; deferred
  reconfiguration-flow:
    status: todo
    comment: Reconfiguration not yet implemented
  repair-issues:
    status: todo
    comment: Repair issues not yet implemented
  stale-devices:
    status: exempt
    comment: Integration does not create devices

  # ============================================================================
  # Platinum tier
  # ============================================================================
  
  async-dependency:
    status: done
    comment: No external dependencies
  inject-websession:
    status: exempt
    comment: No HTTP client usage
  strict-typing:
    status: todo
    comment: Full strict typing not yet verified
