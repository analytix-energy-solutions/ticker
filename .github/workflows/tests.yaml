name: Automated tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-cov voluptuous

      - name: Run tests with coverage
        run: >
          pytest tests/ -v
          --cov=custom_components/ticker
          --cov-report=term-missing
          --cov-report=xml
